---
version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
  - package-ecosystem: docker
    directories:
      - "/"
      - "/docker/php-fpm"
      - "/docker/laravel-horizon"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30