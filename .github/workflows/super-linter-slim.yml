---
name: Revisar formato de código

on:  # yamllint disable-line rule:truthy
  push: null
  pull_request: null

permissions: {}

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-linter
        uses: super-linter/super-linter/slim@4ce20838b8ab83717e78138c5b3a1407148e0918  # v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ---------------------------------------------------------------
          # General
          # ---------------------------------------------------------------
          # Required when ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT is true
          SAVE_SUPER_LINTER_SUMMARY: true
          # Treat conflicting tools as a hard error
          FAIL_ON_CONFLICTING_TOOLS_ENABLED: true
          # Respect .gitignore — skips vendor/, node_modules/, storage/ etc.
          IGNORE_GITIGNORED_FILES: true
          # Extra exclusion for generated files that may be committed
          FILTER_REGEX_EXCLUDE: .*(public/build|bootstrap/cache|_ide_helper).*
          # Config files live in .github/linters/ (super-linter default)
          LINTER_RULES_PATH: .github/linters

          # ---------------------------------------------------------------
          # Composer — platform extension fix
          # The super-linter container runs Alpine Linux with a minimal
          # PHP 8.4 build. It is missing ext-session, ext-fileinfo,
          # ext-gd, ext-exif, and ext-xml, which are required by the
          # lock file but NOT needed for static linting.
          # COMPOSER_IGNORE_PLATFORM_REQS is a native Composer env var
          # (equivalent to --ignore-platform-reqs) and is respected by
          # every composer install call super-linter makes internally,
          # including those for each Modules/*/composer.json.
          # ---------------------------------------------------------------
          COMPOSER_IGNORE_PLATFORM_REQS: 1

          # ---------------------------------------------------------------
          # Git
          # No commitlint config in this project — disable to silence warning
          # ---------------------------------------------------------------
          VALIDATE_GIT_COMMITLINT: false

          # ---------------------------------------------------------------
          # PHP — Laravel standard
          # PHP_BUILTIN (php -l syntax check) and PHP_PHPCS (PSR-12) are
          # left ON. PHPStan and Psalm are disabled because they require a
          # full composer install with Laravel stubs to avoid false positives;
          # run them in a dedicated job if needed.
          # ---------------------------------------------------------------
          VALIDATE_PHP_PHPSTAN: false
          VALIDATE_PHP_PSALM: false
          PHP_PHPCS_FILE_NAME: phpcs.xml

          # ---------------------------------------------------------------
          # JavaScript — Biome handles lint + format
          # [JAVASCRIPT_ES]      → flag: VALIDATE_JAVASCRIPT_ES
          # [JAVASCRIPT_PRETTIER]→ flag: VALIDATE_JAVASCRIPT_PRETTIER
          # ---------------------------------------------------------------
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_PRETTIER: false

          # ---------------------------------------------------------------
          # TypeScript — Biome handles lint + format
          # [TYPESCRIPT_ES]      → flag: VALIDATE_TYPESCRIPT_ES
          # [TYPESCRIPT_PRETTIER]→ flag: VALIDATE_TYPESCRIPT_PRETTIER
          # ---------------------------------------------------------------
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TYPESCRIPT_PRETTIER: false

          # ---------------------------------------------------------------
          # JSX — Biome handles lint + format
          # [JSX]         → flag: VALIDATE_JSX        (ESLint in super-linter)
          # [JSX_PRETTIER]→ flag: VALIDATE_JSX_PRETTIER
          # ---------------------------------------------------------------
          VALIDATE_JSX: false
          VALIDATE_JSX_PRETTIER: false

          # ---------------------------------------------------------------
          # TSX — Biome handles lint + format
          # [TSX] → flag: VALIDATE_TSX               (ESLint in super-linter)
          # ---------------------------------------------------------------
          VALIDATE_TSX: false

          # ---------------------------------------------------------------
          # Vue — Biome handles lint + format
          # [VUE]         → flag: VALIDATE_VUE        (ESLint in super-linter)
          # [VUE_PRETTIER]→ flag: VALIDATE_VUE_PRETTIER
          # ---------------------------------------------------------------
          VALIDATE_VUE: false
          VALIDATE_VUE_PRETTIER: false

          # ---------------------------------------------------------------
          # JSON / JSONC
          # Biome handles lint + format.
          # [JSON]          → flag: VALIDATE_JSON          (ESLint)
          # [JSON_PRETTIER] → flag: VALIDATE_JSON_PRETTIER
          # [JSONC]         → flag: VALIDATE_JSONC         (ESLint)
          # [JSONC_PRETTIER]→ flag: VALIDATE_JSONC_PRETTIER
          # ---------------------------------------------------------------
          VALIDATE_JSON: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_JSONC: false
          VALIDATE_JSONC_PRETTIER: false

          # ---------------------------------------------------------------
          # CSS / SCSS / SASS — Biome handles lint + format
          # [CSS]         → flag: VALIDATE_CSS        (Stylelint)
          # [CSS_PRETTIER]→ flag: VALIDATE_CSS_PRETTIER
          # ---------------------------------------------------------------
          VALIDATE_CSS: false
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_SCSS: false
          VALIDATE_SASS: false

          # ---------------------------------------------------------------
          # GraphQL / HTML / YAML
          # Prettier disabled (Biome covers these formats)
          # ---------------------------------------------------------------
          VALIDATE_GRAPHQL_PRETTIER: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false

          # ---------------------------------------------------------------
          # Languages not used in this project
          # ---------------------------------------------------------------
          VALIDATE_PYTHON: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_RUFF: false
          VALIDATE_PYTHON_RUFF_FORMAT: false
